global:
  dataset_dir: "../datasets"
  output_dir: "./data_website"
  # build_dir: "../build/estimators"
  build_dir: "../cmake-build-release/estimators"
  save: ["estimation", "error"] 

datasets:
  - name: "PCPNet"
    dir: "PCPNet_rescaled"
    extension: ".pts"
    # lists: ["list/tiny_testset_no_noise.txt"] # Generation of an unwanted subdirectory 
    pattern: ["netsuke100k", "Liberty100k", "column100k"]

jobs:
  
  - name: "PCPNet/0.075"
    executable: "compute_ponca_estimators"
    
    static_args:
      --stats: ""
      --unsigned-curvature: ""
      --seed: 1

    grid:
      -e: ["3DQuadric", "PC-MLS", "2-Monge", "Varifolds","VarifoldsMeanPlane", "WaveJets", "AvgHexagram", "ShapeOperator", "PCA", "ASO", "APSS", "Sphere", "UnorientedSphere", "Cov2D", "NormCov2D", "NormCov3D", "Mean"]
      -r: [0.075]
      --mls-iter: [1]
      --kernel: ["smooth"]
    
  - name: "PCPNet/0.075"
    executable: "compute_jetfitting"
    method_label: "JetFitting"

    static_args:
      --stats: ""
      --seed: 1

    grid:
      -r: [0.075]

  - name: "PCPNet/0.1"
    executable: "compute_ponca_estimators"
    
    static_args:
      --stats: ""
      --unsigned-curvature: ""
      --seed: 1

    grid:
      -e: ["3DQuadric", "PC-MLS", "2-Monge", "Varifolds","VarifoldsMeanPlane", "WaveJets", "AvgHexagram", "ShapeOperator", "PCA", "ASO", "APSS", "Sphere", "UnorientedSphere", "Cov2D", "NormCov2D", "NormCov3D", "Mean"]
      -r: [0.1]
      --mls-iter: [1]
      --kernel: ["smooth"]
    
  - name: "PCPNet/0.1"
    executable: "compute_jetfitting"
    method_label: "JetFitting"

    static_args:
      --stats: ""
      --seed: 1

    grid:
      -r: [0.1]

  - name: "PCPNet/0.2"
    executable: "compute_ponca_estimators"
    
    static_args:
      --stats: ""
      --unsigned-curvature: ""
      --seed: 1

    grid:
      -e: ["3DQuadric", "PC-MLS", "2-Monge", "Varifolds","VarifoldsMeanPlane", "WaveJets", "AvgHexagram", "ShapeOperator", "PCA", "ASO", "APSS", "Sphere", "UnorientedSphere", "Cov2D", "NormCov2D", "NormCov3D", "Mean"]
      -r: [0.2]
      --mls-iter: [1]
      --kernel: ["smooth"]
    
  - name: "PCPNet/0.2"
    executable: "compute_jetfitting"
    method_label: "JetFitting"

    static_args:
      --stats: ""
      --seed: 1

    grid:
      -r: [0.2]